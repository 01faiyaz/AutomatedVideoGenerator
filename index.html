<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      background: #0f0f1a;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #7c3aed;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 24px;
    }

    .example-btn {
      background: #0f0f1a;
      border: 1px solid #2a2a4e;
      border-radius: 20px;
      color: #888;
      font-size: 0.78rem;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-btn:hover {
      border-color: #7c3aed;
      color: #a78bfa;
    }

    .generate-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .generate-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 24px;
      padding: 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    .status.loading {
      display: block;
      background: #1e1e3a;
      border: 1px solid #2a2a4e;
      color: #a78bfa;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #7c3aed;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      margin-top: 24px;
      display: none;
    }

    .result-card {
      background: #0f0f1a;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #7c3aed;
      margin-bottom: 6px;
    }

    .result-value {
      font-size: 0.9rem;
      color: #ddd;
      line-height: 1.5;
    }

    .result-value.title-val {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    .thumbnail-badge {
      display: inline-block;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      padding: 10px 20px;
      border-radius: 8px;
    }

    .path-tag {
      font-family: monospace;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      color: #60a5fa;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .success-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .success-icon { font-size: 1.5rem; }
    .success-title { font-weight: 700; color: #4ade80; font-size: 1rem; }
    .success-time { color: #888; font-size: 0.8rem; }

    .error-status {
      display: block;
      background: #2a1a1a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 16px;
      border-radius: 10px;
      margin-top: 24px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎬 AI Video Generator</h1>
    <p class="subtitle">Enter a topic and get a complete MP4 with voiceover, subtitles, and metadata</p>

    <label for="topic">Video Topic</label>
    <input type="text" id="topic" placeholder="e.g. 5 facts about black holes" />

    <div class="examples">
      <span style="font-size:0.78rem;color:#666;margin-right:2px">Try:</span>
      <button class="example-btn" onclick="setTopic('5 facts about black holes')">5 facts about black holes</button>
      <button class="example-btn" onclick="setTopic('How solar panels work')">How solar panels work</button>
      <button class="example-btn" onclick="setTopic('History of the internet')">History of the internet</button>
      <button class="example-btn" onclick="setTopic('Beginner guide to investing')">Beginner guide to investing</button>
      <button class="example-btn" onclick="setTopic('Benefits of drinking water')">Benefits of drinking water</button>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateVideo()">
      Generate Video
    </button>

    <div class="status loading" id="statusBox">
      <span class="spinner"></span>
      <span id="statusText">Generating your video... this takes 1-3 minutes.</span>
    </div>

    <div id="errorBox" class="error-status" style="display:none"></div>

    <div class="result" id="resultBox">
      <div class="success-header">
        <span class="success-icon">✅</span>
        <div>
          <div class="success-title">Video generated successfully!</div>
          <div class="success-time" id="elapsedTime"></div>
        </div>
      </div>

      <div class="result-card">
        <div class="result-label">Title</div>
        <div class="result-value title-val" id="resTitle"></div>
      </div>

      <div class="result-card">
        <div class="result-label">Description</div>
        <div class="result-value" id="resDescription"></div>
      </div>

      <div class="result-card">
        <div class="result-label">Thumbnail Text</div>
        <div class="result-value"><span class="thumbnail-badge" id="resThumbnail"></span></div>
      </div>

      <div class="result-card">
        <div class="result-label">Output Files</div>
        <div class="result-value">
          <div>🎬 Video: <span class="path-tag" id="resVideo"></span></div>
          <div style="margin-top:6px">📝 Subtitles: <span class="path-tag" id="resSubs"></span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Update this if your FastAPI runs on a different port
    const API_BASE = "http://localhost:8000";

    function setTopic(text) {
      document.getElementById("topic").value = text;
    }

    async function generateVideo() {
      const topic = document.getElementById("topic").value.trim();
      if (!topic) {
        alert("Please enter a topic first.");
        return;
      }

      const btn = document.getElementById("generateBtn");
      const statusBox = document.getElementById("statusBox");
      const errorBox = document.getElementById("errorBox");
      const resultBox = document.getElementById("resultBox");

      btn.disabled = true;
      btn.textContent = "Generating...";
      statusBox.style.display = "block";
      errorBox.style.display = "none";
      resultBox.style.display = "none";

      const steps = [
        "Generating script with AI...",
        "Fetching stock video clips...",
        "Creating voiceover audio...",
        "Generating subtitle file...",
        "Assembling final video with FFmpeg..."
      ];
      let stepIdx = 0;
      const stepTimer = setInterval(() => {
        if (stepIdx < steps.length) {
          document.getElementById("statusText").textContent = steps[stepIdx++];
        }
      }, 18000); // ~18s per step

      try {
        const response = await fetch(`${API_BASE}/generate-video`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic })
        });

        clearInterval(stepTimer);

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || "Server error");
        }

        const data = await response.json();

        // Populate result
        document.getElementById("resTitle").textContent = data.title;
        document.getElementById("resDescription").textContent = data.description;
        document.getElementById("resThumbnail").textContent = data.thumbnail_text;
        document.getElementById("resVideo").textContent = data.video_path;
        document.getElementById("resSubs").textContent = data.subtitle_path;
        document.getElementById("elapsedTime").textContent =
          `Completed in ${data.elapsed_seconds}s`;

        statusBox.style.display = "none";
        resultBox.style.display = "block";

      } catch (err) {
        clearInterval(stepTimer);
        statusBox.style.display = "none";
        errorBox.style.display = "block";
        errorBox.textContent = `❌ Error: ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = "Generate Video";
      }
    }

    // Allow pressing Enter in the input
    document.getElementById("topic").addEventListener("keydown", (e) => {
      if (e.key === "Enter") generateVideo();
    });
  </script>
</body>
</html>
